# This is the name of the workflow, it will be displayed in the GitHub actions interface
name: CD-CD_Pipeline 
# Now, we define what events will trigger the workflow, the keyword - on is used to trigger a workflow and in this case we want to trigger on 3 different scenarios
on:
  push:
    branches:
      - main
      - 'feature/*' # This means that the pipeline will be triggered on any PUSH to a branch starting with 'feature/'
  pull_request:
    branches:
      - main
  workflow_dispatch: # This is useful when you want to allow manual triggereing of the workflow, debugging or special cases.
      # This manual triggering can be done on the GitHub actions UI.

jobs: # Let's start defining the CI jobs with the first CI job being building & pushing the Docker image if either the docker file or requirements.txt change.
  build-and-push-image: # This is the name of the job
    runs-on: ubuntu-latest # This is the runner, which is an environment where the job is executed and GitHub will provide a hosted Virtual Machine.
    steps: # Steps to be executed
      - name: Checkout code
        uses: actions/checkout@v6 # GitHub actions provides this built-in CheckOut Actions which allows you to have access to your code base
      - name: Get changed files # Changed files: Effortlessly track all changed files and directories relative to a target branch.
        id: changed-files-build # ID of the step 
        uses: tj-actions/changed-files@v47 # Built in we're using and its version, this can be found in the GitHub official repo https://github.com/tj-actions/changed-files?tab=readme-ov-file
        with: # We specify the name of the files we'd like to monitor
          files: | 
            Dockerfile
            requirements.txt
      - name: Setup Docker Buildx # This step of rebuilding the Docker image will be executed if only if any of the listed files above have changes on them.
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@v4 # This is another action of GitHub actions https://github.com/docker/setup-buildx-action?tab=readme-ov-file#configuring-your-builder
# Now, to actually build and push the Docker image, we still need write the code for it, cuz!        
# Log into Docker Hub - Since we need to pass sensitive information, like Docker Hub password, we can use GitHub actions. We can find these in the repo.
# Settings --> Secrets and variables --> Actions: Here we define Docker Hub namespace and Docker Hub username in the "Variables" section.
# Settings --> Secrets and variables --> Secrets: Wedefined our secrets here.
      - name: Log in to DockerHub 
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/login-action@v4
        with: 
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
# Now that we're logged in, we need to push the docker image to our personal Docker Hub account, HOWEVER, this is only needed if there's a change in the requirements.txt file or the Docker file
      - name: Build and push Docker image
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: |
               docker buildx build --push \
                 --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest  \
                 --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} \
                 .
# The second tag is based on the commit hash ${{ github.sha }}, which is GitHub actions variable that uniquely identifies the image for the specific commit
# This help us track the version and the changes, this is equivalent to what we were doing with the ".env" file, we used the variable "IMAGE_TAG=1.0.1" 
# The very last thing we can't forget is that we need to include the BUILD CONTEXT for Docker, which in our case is the current directory so we specified a dot (.) after the commit hash.
# NOW, WE PROCEED TO DEFINE THE 2ND JOB. THIS JOB WILL ONLY NEED TO RUN IF CERTAIN FILES WITHIN OUR CODEBASE CHANGE. HERE WE WILL INTRODUCE THE CONCEPT OF JOB DEPENDENCIES
# So, let's follow the same strucure as the the 1st job and give it and appropiate name such as this:
  unit-and-integration-and-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-push-image
# This is the name of the first job. This basically says that build-and-push-image has to complete successfully so the 2nd job can run.
# Now, we need to tell the YAML where it should be looking for the credentials, since we're not using the ".env" in our CI/CD process for obvious reasons
    env: 
      POSTGRES_CONN_USERNAME: "${{ secrets.POSTGRES_CONN_USERNAME }}"
      POSTGRES_CONN_PASSWORD: "${{ secrets.POSTGRES_CONN_PASSWORD }}"
      POSTGRES_CONN_HOST: "${{ secrets.POSTGRES_CONN_HOST }}"
      POSTGRES_CONN_PORT: ${{ secrets.POSTGRES_CONN_PORT }}
      METADATA_DATABASE_NAME: "${{ secrets.METADATA_DATABASE_NAME }}"
      METADATA_DATABASE_USERNAME: "${{ secrets.METADATA_DATABASE_USERNAME }}"
      METADATA_DATABASE_PASSWORD: "${{ secrets.METADATA_DATABASE_PASSWORD }}"
      CELERY_BACKEND_NAME: "${{ secrets.CELERY_BACKEND_NAME }}"
      CELERY_BACKEND_USERNAME: "${{ secrets.CELERY_BACKEND_USERNAME }}"
      CELERY_BACKEND_PASSWORD: "${{ secrets.CELERY_BACKEND_PASSWORD }}"
      ELT_DATABASE_NAME: "${{ secrets.ELT_DATABASE_NAME }}"
      ELT_DATABASE_USERNAME: "${{ secrets.ELT_DATABASE_USERNAME }}"
      ELT_DATABASE_PASSWORD: "${{ secrets.ELT_DATABASE_PASSWORD }}"
      AIRFLOW_UID: "${{ vars.AIRFLOW_UID }}"
      AIRFLOW_WWW_USER_USERNAME: "${{ secrets.AIRFLOW_WWW_USER_USERNAME }}"
      AIRFLOW_WWW_USER_PASSWORD: "${{ secrets.AIRFLOW_WWW_USER_PASSWORD }}"
      FERNET_KEY: "${{ secrets.FERNET_KEY }}"
      API_KEY: "${{ secrets.API_KEY }}"
      CHANNEL_HANDLE: "${{ vars.CHANNEL_HANDLE }}"
    steps: # Steps to be executed
      - name: Checkout code
        uses: actions/checkout@v6 
      - name: Get changed files
        id: changed-files-tests
        uses: tj-actions/changed-files@v47
        with: # Files to be monitored for changes
          files: |
              dags/**
              include/**
              docker-compose.yaml
      - name: Set up Docker Compose
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: docker compose up -d
      - name: Run Unit Integration Tests
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: docker exec -t airflow-worker sh -c "pytest tests/ -v"
      - name: Run End-to-End DAG Tests
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: |
          DAG_NAMES=("produce_json", "update_db", "data_quality") 
          for DAG in "${DAG_NAMES[@]}"; do
            docker exec -t airflow-worker sh -c "airflow dags test $DAG"
          done
# In the "${DAG_NAMES[@]}" part, the @ means that every item in the list is treated as individual
# Now, we tear down the docker containers to free up resources
      - name: Tear down Docker Containers
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: docker compose down